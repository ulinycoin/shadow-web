<!DOCTYPE html>
<html>
<head>
  <title>Amazon.com: dog toy</title>
  <style>.a-button{background:#ffd814}.a-size-base{font-size:13px}</style>
  <script>var ue_id = 'ATVPDKIKX0DER';</script>
</head>
<body>
  <header>
    <a href="/">Amazon</a>
    <input type="text" name="field-keywords" placeholder="Search Amazon" aria-label="Search"/>
    <button type="submit">Go</button>
    <a href="/cart">Cart</a>
  </header>
  <main>
    <h1>Rope Dog Toy - Medium</h1>
    <button aria-label="Add to Cart">Add to Cart</button>
    <button aria-label="Buy Now">Buy Now</button>
    <select name="quantity" aria-label="Quantity">
      <option value="1">1</option>
      <option value="2">2</option>
    </select>
    <a href="/reviews">See all reviews</a>
    <form action="/gift-card">
      <input type="text" placeholder="Gift card code" name="code"/>
      <button type="submit">Apply</button>
    </form>
  </main>
</body>
</html>
